<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BO 상품가격 일괄등록 - ERP</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
    font-size: 13px;
    background: #f5f6f8;
    color: #333;
  }

  /* ── 브레드크럼 ── */
  .breadcrumb-bar {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 9px 18px;
    font-size: 12px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .breadcrumb-bar .bc-item { color: #555; }
  .breadcrumb-bar .bc-item:last-child { color: #222; font-weight: bold; }
  .breadcrumb-bar .bc-sep { color: #bbb; font-size: 11px; }

  /* ── 페이지 컨텐츠 영역 ── */
  .page-wrap { padding: 20px 18px; }

  /* ── 폼 테이블 ── */
  .form-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #d0d0d0;
    margin-bottom: 10px;
  }
  .form-table tr { border-bottom: 1px solid #e0e0e0; }
  .form-table tr:last-child { border-bottom: none; }
  .form-table th {
    background: #f5f6f8;
    border-right: 1px solid #e0e0e0;
    padding: 9px 14px;
    font-size: 12px;
    font-weight: bold;
    color: #444;
    white-space: nowrap;
    text-align: left;
    width: 110px;
    vertical-align: middle;
  }
  .form-table td {
    padding: 7px 10px;
    background: #fff;
    vertical-align: middle;
  }

  /* ── 기본 인풋 ── */
  .erp-input {
    width: 100%;
    height: 26px;
    border: 1px solid #c8c8c8;
    padding: 0 7px;
    font-size: 12px;
    font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
    color: #333;
    background: #fff;
    outline: none;
  }
  .erp-input:focus { border-color: #4a7fc1; }

  /* ── 셀렉트박스 ── */
  .erp-select {
    height: 26px;
    border: 1px solid #c8c8c8;
    padding: 0 6px;
    font-size: 12px;
    font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
    color: #333;
    background: #fff;
    cursor: pointer;
    min-width: 140px;
  }
  .erp-select:focus { border-color: #4a7fc1; outline: none; }

  /* ── 파일 인풋 영역 ── */
  .file-area { display: flex; align-items: center; gap: 6px; }
  .file-area input[type="file"] { display: none; }
  .btn-file {
    height: 26px; padding: 0 12px;
    border: 1px solid #b0b0b0; background: #f0f0f0;
    font-size: 12px; font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
    color: #333; cursor: pointer; border-radius: 1px;
  }
  .btn-file:hover { background: #e0e0e0; }
  .file-name-display {
    font-size: 12px; color: #999;
    height: 26px; line-height: 26px;
    border: 1px solid #e0e0e0; background: #fafafa;
    padding: 0 10px; min-width: 200px;
  }

  /* ── 라디오 토글 버튼 그룹 ── */
  .toggle-group { display: inline-flex; align-items: center; gap: 0; }
  .toggle-group input[type="radio"] { display: none; }
  .toggle-group label {
    display: inline-flex; align-items: center; justify-content: center;
    height: 26px; padding: 0 20px;
    border: 1px solid #c8c8c8; border-right: none;
    background: #f8f9fa;
    font-size: 12px; font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
    color: #555; cursor: pointer; white-space: nowrap;
    transition: all 0.12s; user-select: none;
  }
  .toggle-group label:first-of-type { border-radius: 2px 0 0 2px; }
  .toggle-group label:last-of-type  { border-radius: 0 2px 2px 0; border-right: 1px solid #c8c8c8; }
  .toggle-group label:hover { background: #e8edf5; color: #2e6da4; border-color: #9ab3d0; }
  .toggle-group input[type="radio"]:checked + label {
    background: #2e6da4; color: #fff; border-color: #1a3a5c; font-weight: bold;
  }

  /* ── 예약 날짜/시간 선택 패널 ── */
  .reservation-panel {
    display: none;       /* 기본 숨김 — JS로 토글 */
    margin-top: 10px;
    border: 1px solid #c8d8ee;
    border-radius: 3px;
    background: #f7faff;
    padding: 14px 16px;
    width: fit-content;
    gap: 20px;
    flex-direction: row;
    align-items: flex-start;
  }
  .reservation-panel.visible {
    display: flex;
  }

  /* ── 달력 ── */
  .calendar-wrap { user-select: none; }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .cal-header .cal-title {
    font-size: 13px; font-weight: bold; color: #1a3a5c; min-width: 110px; text-align: center;
  }
  .cal-nav {
    background: none; border: 1px solid #c8d0dc; width: 22px; height: 22px;
    border-radius: 2px; cursor: pointer; font-size: 11px; color: #555;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav:hover { background: #e0ecf8; color: #1a3a5c; }
  .cal-grid {
    border-collapse: collapse;
    font-size: 12px;
  }
  .cal-grid th {
    width: 30px; height: 24px; text-align: center;
    font-size: 11px; font-weight: bold; color: #888; padding-bottom: 4px;
  }
  .cal-grid th.sun { color: #d9534f; }
  .cal-grid th.sat { color: #2e6da4; }
  .cal-grid td {
    width: 30px; height: 28px; text-align: center;
    border-radius: 50%; cursor: pointer; font-size: 12px; color: #444;
    transition: background 0.1s;
  }
  .cal-grid td:hover:not(.empty):not(.past) {
    background: #d0e6f8; color: #1a3a5c;
  }
  .cal-grid td.empty  { cursor: default; }
  .cal-grid td.past   { color: #ccc; cursor: not-allowed; }
  .cal-grid td.today  { font-weight: bold; color: #2e6da4; }
  .cal-grid td.selected {
    background: #2e6da4 !important; color: #fff !important;
    font-weight: bold; border-radius: 50%;
  }
  .cal-grid td.sun-cell { color: #d9534f; }
  .cal-grid td.sat-cell { color: #2e6da4; }
  .cal-grid td.selected.sun-cell,
  .cal-grid td.selected.sat-cell { color: #fff !important; }

  /* ── 시간 선택 ── */
  .time-wrap {
    display: flex; flex-direction: column; gap: 10px;
    padding-top: 4px;
  }
  .time-wrap .time-title {
    font-size: 12px; font-weight: bold; color: #1a3a5c; margin-bottom: 2px;
  }
  .time-row { display: flex; align-items: center; gap: 6px; }
  .time-row label { font-size: 12px; color: #666; min-width: 22px; text-align: center; }
  .time-select {
    height: 28px; border: 1px solid #c8c8c8; border-radius: 2px;
    padding: 0 6px; font-size: 12px;
    font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
    color: #333; background: #fff; cursor: pointer; width: 64px;
  }
  .time-select:focus { border-color: #4a7fc1; outline: none; }
  .time-sep { font-size: 14px; color: #888; font-weight: bold; }

  /* 선택된 날짜+시간 미리보기 */
  .datetime-preview {
    margin-top: 10px; padding: 7px 12px;
    background: #eaf2fb; border: 1px solid #c0d8f0;
    border-radius: 2px; font-size: 12px; color: #1a3a5c; font-weight: bold;
    display: none;
  }
  .datetime-preview.visible { display: block; }

  /* ── 버튼 영역 ── */
  .btn-bar {
    display: flex; justify-content: flex-end; gap: 4px; padding: 6px 0;
  }
  .btn {
    height: 28px; padding: 0 20px; font-size: 12px;
    font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
    border: 1px solid transparent; border-radius: 2px;
    cursor: pointer; font-weight: bold;
  }
  .btn-save  { background: #2e6da4; color: #fff; border-color: #1a3a5c; }
  .btn-save:hover  { background: #1a3a5c; }
  .btn-list  { background: #333; color: #fff; border-color: #111; }
  .btn-list:hover  { background: #111; }
</style>
</head>
<body>

<!-- 브레드크럼 -->
<div class="breadcrumb-bar">
  <span class="bc-item">상품관리</span>
  <span class="bc-sep">›</span>
  <span class="bc-item">ERP상품정보&amp;BO가격</span>
  <span class="bc-sep">›</span>
  <span class="bc-item">BO 상품가격 일괄등록</span>
</div>

<!-- 페이지 내용 -->
<div class="page-wrap">

  <table class="form-table">
    <tbody>

      <!-- 등록포맷 -->
      <tr>
        <th>등록포맷</th>
        <td>
          <select class="erp-select" id="regFormat">
            <option value="">포맷선택</option>
            <option value="format1">포맷 1</option>
            <option value="format2">포맷 2</option>
          </select>
        </td>
      </tr>

      <!-- 파일구분명 -->
      <tr>
        <th>파일구분명</th>
        <td>
          <input type="text" class="erp-input" id="fileGroupName" placeholder="">
        </td>
      </tr>

      <!-- 적용일시 -->
      <tr>
        <th>적용일시</th>
        <td>
          <!-- 즉시 / 예약 토글 버튼 -->
          <div class="toggle-group">
            <input type="radio" name="applyType" id="at_immediately" value="immediately" checked
                   onchange="handleApplyTypeChange()">
            <label for="at_immediately">즉시</label>

            <input type="radio" name="applyType" id="at_reserved" value="reserved"
                   onchange="handleApplyTypeChange()">
            <label for="at_reserved">예약</label>
          </div>

          <!-- 예약 선택 시 나타나는 날짜+시간 패널 -->
          <div class="reservation-panel" id="reservationPanel">

            <!-- 달력 -->
            <div class="calendar-wrap">
              <div class="cal-header">
                <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
                <span class="cal-title" id="calTitle"></span>
                <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
              </div>
              <table class="cal-grid" id="calGrid"></table>
            </div>

            <!-- 시간 선택 + 미리보기 -->
            <div class="time-wrap">
              <div class="time-title">시간 선택</div>
              <div class="time-row">
                <label>시</label>
                <select class="time-select" id="selHour" onchange="updatePreview()"></select>
                <span class="time-sep">:</span>
                <label>분</label>
                <select class="time-select" id="selMin" onchange="updatePreview()"></select>
              </div>
              <!-- 선택된 날짜+시간 미리보기 -->
              <div class="datetime-preview" id="datetimePreview"></div>
            </div>

          </div>
        </td>
      </tr>

      <!-- 파일 -->
      <tr>
        <th>파일</th>
        <td>
          <div class="file-area">
            <input type="file" id="fileInput" onchange="showFileName(this)">
            <button class="btn-file" onclick="document.getElementById('fileInput').click()">파일 선택</button>
            <span class="file-name-display" id="fileNameDisplay">선택된 파일 없음</span>
          </div>
        </td>
      </tr>

    </tbody>
  </table>

  <!-- 버튼 영역 -->
  <div class="btn-bar">
    <button class="btn btn-save" onclick="handleSave()">저장</button>
    <button class="btn btn-list" onclick="handleList()">목록</button>
  </div>

</div>

<script>
// ── 달력 상태 ──
const today = new Date();
let calYear  = today.getFullYear();
let calMonth = today.getMonth(); // 0-based
let selectedDate = null; // Date 객체

// ── 즉시/예약 토글 변경 처리 ──
function handleApplyTypeChange() {
  const isReserved = document.getElementById('at_reserved').checked;
  const panel = document.getElementById('reservationPanel');
  if (isReserved) {
    panel.classList.add('visible');
    renderCalendar();
    initTimeSelects();
  } else {
    panel.classList.remove('visible');
    document.getElementById('datetimePreview').classList.remove('visible');
  }
}

// ── 달력 렌더링 ──
function renderCalendar() {
  const title = `${calYear}년 ${calMonth + 1}월`;
  document.getElementById('calTitle').textContent = title;

  const days = ['일','월','화','수','목','금','토'];
  let html = '<thead><tr>';
  days.forEach((d, i) => {
    const cls = i === 0 ? 'sun' : i === 6 ? 'sat' : '';
    html += `<th class="${cls}">${d}</th>`;
  });
  html += '</tr></thead><tbody>';

  // 이달 1일의 요일
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  // 이달 마지막 날
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();

  let dayCount = 1;
  for (let row = 0; row < 6; row++) {
    html += '<tr>';
    for (let col = 0; col < 7; col++) {
      const cellIdx = row * 7 + col;
      if (cellIdx < firstDay || dayCount > lastDate) {
        html += '<td class="empty"></td>';
      } else {
        const d = dayCount;
        const cellDate = new Date(calYear, calMonth, d);
        // 오늘 이전은 비활성
        const isPast = cellDate < new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const isToday = (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear());
        const isSel = selectedDate &&
          d === selectedDate.getDate() &&
          calMonth === selectedDate.getMonth() &&
          calYear === selectedDate.getFullYear();
        const isSun = col === 0;
        const isSat = col === 6;

        let cls = '';
        if (isPast)  cls += ' past';
        if (isToday && !isSel) cls += ' today';
        if (isSel)   cls += ' selected';
        if (isSun)   cls += ' sun-cell';
        if (isSat)   cls += ' sat-cell';

        const onclick = isPast ? '' : `onclick="selectDate(${calYear},${calMonth},${d})"`;
        html += `<td class="${cls.trim()}" ${onclick}>${d}</td>`;
        dayCount++;
      }
    }
    html += '</tr>';
    if (dayCount > lastDate) break;
  }
  html += '</tbody>';
  document.getElementById('calGrid').innerHTML = html;
}

// ── 월 이동 ──
function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();
}

// ── 날짜 선택 ──
function selectDate(y, m, d) {
  selectedDate = new Date(y, m, d);
  renderCalendar();
  updatePreview();
}

// ── 시/분 셀렉트 초기화 ──
function initTimeSelects() {
  const hourSel = document.getElementById('selHour');
  const minSel  = document.getElementById('selMin');
  if (hourSel.options.length > 0) return; // 이미 초기화됨

  for (let h = 0; h < 24; h++) {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = String(h).padStart(2, '0');
    if (h === 0) opt.selected = true;
    hourSel.appendChild(opt);
  }
  for (let m = 0; m < 60; m += 10) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = String(m).padStart(2, '0');
    minSel.appendChild(opt);
  }
}

// ── 날짜+시간 미리보기 갱신 ──
function updatePreview() {
  if (!selectedDate) return;
  const h   = String(document.getElementById('selHour').value).padStart(2, '0');
  const m   = String(document.getElementById('selMin').value).padStart(2, '0');
  const y   = selectedDate.getFullYear();
  const mon = String(selectedDate.getMonth() + 1).padStart(2, '0');
  const d   = String(selectedDate.getDate()).padStart(2, '0');
  const preview = document.getElementById('datetimePreview');
  preview.textContent = `📅 예약 적용일시 : ${y}-${mon}-${d} ${h}:${m}`;
  preview.classList.add('visible');
}

// ── 파일명 표시 ──
function showFileName(input) {
  const display = document.getElementById('fileNameDisplay');
  display.textContent = input.files.length > 0 ? input.files[0].name : '선택된 파일 없음';
  display.style.color = input.files.length > 0 ? '#333' : '#999';
}

// ── 저장 ──
function handleSave() {
  const format = document.getElementById('regFormat').value;
  if (!format) { alert('등록포맷을 선택해주세요.'); return; }

  const isReserved = document.getElementById('at_reserved').checked;
  if (isReserved && !selectedDate) {
    alert('예약 날짜를 선택해주세요.'); return;
  }
  alert('저장되었습니다.');
}

// ── 목록 ──
function handleList() {
  alert('목록 화면으로 이동합니다.');
}
</script>
</body>
</html>
